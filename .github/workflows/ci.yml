name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Zainstaluj zależności
        run: pip install -r requirements.txt flake8

      - name: Flake8
        run: flake8 . --max-line-length=120 --exclude=.git,__pycache__

  import-check:
    name: Import check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Zainstaluj zależności
        run: pip install -r requirements.txt

      - name: Sprawdź importy wszystkich modułów
        run: |
          python -c "from config import Config; print('config OK')"
          python -c "from fetcher import OtodomFetcher; print('fetcher OK')"
          python -c "from parser import OtodomParser; print('parser OK')"
          python -c "from storage import MongoStorage; print('storage OK')"
          python -c "from scraper import OtodomScraper; print('scraper OK')"
          python -c "from analysis import DataAnalyzer, PlotGenerator; print('analysis OK')"
          python -c "from text_mining import FrequencyAnalyzer, TextVisualizer; print('text_mining OK')"
          python -c "from ml import FeatureEngineer, PricePredictor; print('ml OK')"
